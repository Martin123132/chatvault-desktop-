<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatVault Dashboard</title>
  <style>
    :root { font-family: Inter, system-ui, Arial, sans-serif; }
    body { margin: 0; background: #f7f7fb; color: #222; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 14px; }
    .search-row { display: flex; gap: 8px; }
    input, button { font: inherit; padding: 8px 10px; border-radius: 8px; border: 1px solid #bbb; }
    button { background: #2f6feb; color: #fff; border-color: #2f6feb; cursor: pointer; }
    button.secondary { background: #fff; color: #333; border-color: #bbb; }
    ul { list-style: none; padding: 0; margin: 10px 0 0; }
    li { border: 1px solid #ececec; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .meta { color: #666; font-size: 12px; }
    .msg { margin-top: 6px; white-space: pre-wrap; }
    .row { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .pill { display: inline-block; padding: 2px 8px; border: 1px solid #ccc; border-radius: 999px; font-size: 12px; margin-right: 5px; }
    .muted { color: #777; }
    h1, h2, h3 { margin: 0 0 10px; }
    .context-box { max-height: 280px; overflow: auto; border: 1px solid #eee; border-radius: 8px; padding: 8px; background: #fafafa; }
    .target { background: #fff4cb; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ChatVault Dashboard</h1>
    <div class="card" style="margin-bottom:14px;">
      <div class="search-row">
        <input id="q" style="flex:1" placeholder="Search messages (FTS query)" />
        <button id="searchBtn">Search</button>
      </div>
      <div class="muted" style="margin-top:6px;">Use search to populate results. Click a result to open the full conversation.</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Results</h2>
        <ul id="results"></ul>
      </div>

      <div class="card">
        <h2 id="convTitle">Conversation Viewer</h2>
        <div id="convMeta" class="meta"></div>
        <ul id="messages"></ul>
      </div>
    </div>

    <div class="grid" style="margin-top:14px;">
      <div class="card">
        <h3>Context Viewer</h3>
        <div class="search-row" style="margin-bottom:8px;">
          <input id="contextMessageId" placeholder="Message ID" />
          <input id="contextWindow" placeholder="Window" value="6" />
          <button id="loadContextBtn" class="secondary">Load context</button>
        </div>
        <div id="context" class="context-box muted">No context loaded.</div>
      </div>

      <div class="card">
        <h3>Tags</h3>
        <div class="search-row" style="margin-bottom:8px;">
          <input id="tagMessageId" placeholder="Message ID" />
          <input id="tagName" placeholder="Tag name" />
          <button id="addTagBtn" class="secondary">Add tag</button>
        </div>
        <div class="search-row" style="margin-bottom:8px;">
          <input id="tagListMessageId" placeholder="Message ID to view tags" />
          <button id="loadTagsBtn" class="secondary">Load tags</button>
        </div>
        <div id="tagOut" class="muted">No tags loaded.</div>
      </div>
    </div>
  </div>

<script>
const els = {
  q: document.getElementById('q'),
  searchBtn: document.getElementById('searchBtn'),
  results: document.getElementById('results'),
  convTitle: document.getElementById('convTitle'),
  convMeta: document.getElementById('convMeta'),
  messages: document.getElementById('messages'),
  contextMessageId: document.getElementById('contextMessageId'),
  contextWindow: document.getElementById('contextWindow'),
  loadContextBtn: document.getElementById('loadContextBtn'),
  context: document.getElementById('context'),
  tagMessageId: document.getElementById('tagMessageId'),
  tagName: document.getElementById('tagName'),
  addTagBtn: document.getElementById('addTagBtn'),
  tagListMessageId: document.getElementById('tagListMessageId'),
  loadTagsBtn: document.getElementById('loadTagsBtn'),
  tagOut: document.getElementById('tagOut'),
};

async function jget(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function jpost(url, body) {
  const r = await fetch(url, { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function messageLi(m) {
  const li = document.createElement('li');
  li.innerHTML = `<div class="row"><strong>#${m.id} ${m.role}</strong><button class="secondary" data-mid="${m.id}">Context</button></div>
                  <div class="meta">${m.created_at || ''}</div>
                  <div class="msg"></div>`;
  li.querySelector('.msg').textContent = m.content;
  li.querySelector('button').addEventListener('click', () => {
    els.contextMessageId.value = m.id;
    loadContext();
  });
  return li;
}

async function search() {
  const q = els.q.value.trim();
  els.results.innerHTML = '';
  if (!q) return;
  const rows = await jget(`/api/search?q=${encodeURIComponent(q)}`);
  if (!rows.length) {
    els.results.innerHTML = '<li class="muted">No results.</li>';
    return;
  }
  for (const r of rows) {
    const li = document.createElement('li');
    li.innerHTML = `<div class="row"><strong>#${r.message_id}</strong><button class="secondary">Open conversation ${r.conversation_id}</button></div>
                    <div class="meta">${r.role} · ${r.conversation_title || '(untitled)'}</div>
                    <div class="msg"></div>`;
    li.querySelector('.msg').textContent = r.snippet || '';
    li.querySelector('button').addEventListener('click', () => loadConversation(r.conversation_id));
    els.results.appendChild(li);
  }
}

async function loadConversation(conversationId) {
  const data = await jget(`/api/conversations/${conversationId}`);
  els.convTitle.textContent = `Conversation Viewer — #${data.id} ${data.title || '(untitled)'}`;
  els.convMeta.textContent = `provider=${data.provider} · messages=${data.messages.length}`;
  els.messages.innerHTML = '';
  for (const m of data.messages) {
    els.messages.appendChild(messageLi(m));
  }
}

async function loadContext() {
  const mid = Number(els.contextMessageId.value || 0);
  const window = Number(els.contextWindow.value || 6);
  if (!mid) return;
  const data = await jget(`/api/messages/${mid}/context?window=${window}`);
  const box = document.createElement('div');
  for (const item of data.items) {
    const row = document.createElement('div');
    row.className = item.is_target ? 'target' : '';
    row.style.padding = '6px';
    row.style.borderRadius = '6px';
    row.style.marginBottom = '4px';
    row.innerHTML = `<div class="meta">#${item.id} ${item.role} · ${item.created_at || ''}</div><div class="msg"></div>`;
    row.querySelector('.msg').textContent = item.content;
    box.appendChild(row);
  }
  els.context.innerHTML = '';
  els.context.appendChild(box);
}

async function addTag() {
  const mid = Number(els.tagMessageId.value || 0);
  const tag = els.tagName.value.trim();
  if (!mid || !tag) return;
  const data = await jpost(`/api/messages/${mid}/tags`, { tag });
  els.tagOut.innerHTML = data.tags.map(t => `<span class="pill">${t}</span>`).join(' ');
}

async function loadTags() {
  const mid = Number(els.tagListMessageId.value || 0);
  if (!mid) return;
  const data = await jget(`/api/messages/${mid}/tags`);
  els.tagOut.innerHTML = data.tags.length ? data.tags.map(t => `<span class="pill">${t}</span>`).join(' ') : '<span class="muted">No tags</span>';
}

els.searchBtn.addEventListener('click', search);
els.q.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });
els.loadContextBtn.addEventListener('click', loadContext);
els.addTagBtn.addEventListener('click', addTag);
els.loadTagsBtn.addEventListener('click', loadTags);
</script>
</body>
</html>
